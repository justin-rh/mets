services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mets-db
    environment:
      POSTGRES_USER: mets
      POSTGRES_PASSWORD: mets_dev
      POSTGRES_DB: mets
    ports:
      - "5433:5432"
    volumes:
      - mets_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mets -d mets"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mets_pgdata:
